[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = mysql+pymysql://43pCkc13g2qBjEF.root:lD0uSieZCD23ERII@gateway01.ap-southeast-1.prod.alicloud.tidbcloud.com:4000/ERoom

# Override via environment variables:
#   DATABASE_URL=postgresql://user:pass@host:5432/eroom
#   DATABASE_URL_SYNC=postgresql://user:pass@host:5432/eroom

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S