services:
  api:
    build: ./backend
    command: uv run python -m app.server
    ports:
      - "8000:8000"
    restart: unless-stopped
    env_file: ./backend/.env.docker
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  celery_worker:
    build: ./backend
    command: uv run celery -A app.infrastructure.celery.celery_app worker --loglevel=info
    restart: unless-stopped
    env_file: ./backend/.env.docker
    depends_on:
      redis:
        condition: service_healthy

  celery_beat:
    build: ./backend
    command: uv run celery -A app.infrastructure.celery.celery_app beat --loglevel=info
    restart: unless-stopped
    env_file: ./backend/.env.docker
    depends_on:
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: engconnect
      POSTGRES_USER: engconnect_app
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engconnect_app -d engconnect"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: e_room_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio_init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: ["/bin/sh", "/config/init-buckets.sh"]
    volumes:
      - ./init-buckets.sh:/config/init-buckets.sh:ro

  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    depends_on:
      redis:
        condition: service_healthy

  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    ports:
      - "3478:3478"
      - "3478:3478/udp"
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: ["-c", "/etc/coturn/turnserver.conf"]

  frontend:
    build: ./frontend
    container_name: e_room_frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      REACT_APP_API_BASE_URL: http://localhost:8000/api/v1
      REACT_APP_WS_BASE_URL: ws://localhost:8000
    stdin_open: true
    tty: true

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  redis_data:
  minio_data:
